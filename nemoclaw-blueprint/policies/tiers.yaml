#
# Tier definitions for the NemoClaw policy selector.
#
# Each tier maps to a named posture. The base sandbox policy
# (openclaw-sandbox.yaml) is always applied regardless of tier.
# Tiers add presets on top of that baseline.
#
# access values:
#   read       — GET only (or equivalent read-only rules for that service)
#   read-write — GET + POST/PUT/PATCH (explicitly opt-in; never the default)
#
# agents (optional): when present, the preset is only suggested for the
# listed agents (e.g. [hermes]). Presets without an `agents` field apply to
# every agent. This keeps agent-native presets (such as the Hermes Nous
# managed tool gateways) out of other agents' normal posture.

tiers:
  - name: restricted
    label: Restricted
    description: Base sandbox only. No third-party network access beyond inference and core agent tooling.
    presets: []

  - name: balanced
    label: Balanced
    description: Full dev tooling, web search, and safe common-assistant defaults (weather). Package installs, model downloads, and inference. No messaging platform access.
    presets:
      - { name: npm,          access: read-write }
      - { name: pypi,         access: read-write }
      - { name: huggingface,  access: read-write }
      - { name: brew,         access: read-write }
      - { name: brave,        access: read-write }
      # Safe common-assistant default: read-only weather/geocoding lookup.
      - { name: weather,      access: read }

  - name: open
    label: Open
    description: Broad access across third-party services including messaging and productivity, plus curated public reference/data APIs. User accepts responsibility for the expanded scope.
    presets:
      - { name: npm,          access: read-write }
      - { name: pypi,         access: read-write }
      - { name: huggingface,  access: read-write }
      - { name: brew,         access: read-write }
      - { name: brave,        access: read-write }
      - { name: slack,        access: read-write }
      - { name: discord,      access: read-write }
      - { name: telegram,     access: read-write }
      - { name: wechat,       access: read-write }
      - { name: whatsapp,     access: read-write }
      - { name: jira,         access: read-write }
      - { name: outlook,      access: read-write }
      # Curated public reference/data APIs: useful for assistant work but not
      # arbitrary browsing. Explicit hosts, read-only.
      - { name: weather,        access: read }
      - { name: wikimedia,      access: read }
      - { name: wikidata,       access: read }
      - { name: nominatim,      access: read }
      - { name: rest-countries, access: read }
      # Hermes Nous managed tool gateways — the Hermes-native way to stay
      # useful while routing through managed gateways instead of arbitrary
      # direct web egress. Hermes-only so they never enter OpenClaw's posture.
      - { name: nous-web,     access: read-write, agents: [hermes] }
      - { name: nous-image,   access: read-write, agents: [hermes] }
      - { name: nous-audio,   access: read-write, agents: [hermes] }
      - { name: nous-browser, access: read-write, agents: [hermes] }
      - { name: nous-code,    access: read-write, agents: [hermes] }
