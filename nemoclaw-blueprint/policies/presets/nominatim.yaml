# Curated public reference data: OpenStreetMap Nominatim geocoding/search.
# Explicit host, read-only (GET/HEAD), no wildcard egress, no `access: full`,
# no generic "/**" binary access. Intended for the `open` tier.

preset:
  name: nominatim
  description: "OpenStreetMap Nominatim geocoding/search API (read-only)"

network_policies:
  nominatim:
    name: nominatim
    endpoints:
      - host: nominatim.openstreetmap.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
