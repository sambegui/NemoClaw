#
# Curated public reference data: REST Countries country metadata.
# Explicit host, read-only (GET/HEAD), no wildcard egress, no `access: full`,
# no generic "/**" binary access. Intended for the `open` tier.

preset:
  name: rest-countries
  description: "REST Countries country metadata API (read-only)"

network_policies:
  rest_countries:
    name: rest_countries
    endpoints:
      - host: restcountries.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
