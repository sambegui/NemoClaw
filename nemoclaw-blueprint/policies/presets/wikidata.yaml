#
# Curated public reference data: Wikidata entity API and SPARQL query service.
# Explicit hosts, read-only (GET/HEAD), no wildcard egress, no `access: full`,
# no generic "/**" binary access. Intended for the `open` tier.

preset:
  name: wikidata
  description: "Wikidata entity API and SPARQL query service (read-only)"

network_policies:
  wikidata:
    name: wikidata
    endpoints:
      - host: www.wikidata.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: query.wikidata.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
