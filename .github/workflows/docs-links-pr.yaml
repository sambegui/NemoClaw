name: Docs / Link Check

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".github/workflows/docs-links-pr.yaml"
      - "test/e2e/e2e-cloud-experimental/check-docs.sh"

permissions:
  contents: read

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Determine changed documentation files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node --no-warnings --experimental-strip-types scripts/github/changed-docs.ts

      - name: Run markdown link checker
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t doc_files <<< "${{ steps.changed.outputs.files }}"
          bash test/e2e/e2e-cloud-experimental/check-docs.sh --only-links --local-only "${doc_files[@]}"
