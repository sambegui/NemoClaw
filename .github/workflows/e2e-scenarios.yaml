#
# Scenario-based E2E. Runs a single setup scenario by id against the
# matching runner and uploads runtime artifacts for debugging.
#
# Manual-only (workflow_dispatch) while scenario-based coverage migrates.
# Existing nightly-e2e / macos-e2e / wsl-e2e workflows remain unchanged.

name: E2E / Scenario Runner

on:
  workflow_call:
    inputs:
      scenario:
        description: "Scenario id (e.g. ubuntu-repo-cloud-openclaw)"
        required: true
        type: string
      suite_filter:
        description: "Comma-separated suite ids to run (optional; defaults to the scenario's full suite list)"
        required: false
        default: ""
        type: string
    secrets:
      NVIDIA_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario id (e.g. ubuntu-repo-cloud-openclaw)"
        required: true
        type: string
      suite_filter:
        description: "Comma-separated suite ids to run (optional; defaults to the scenario's full suite list)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: e2e-scenarios-${{ inputs.scenario }}
  cancel-in-progress: false

jobs:
  # Route the scenario to the correct runner.
  #
  # Scenario ids encode their target platform as the first segment
  # (e.g. `macos-repo-cloud-openclaw`, `wsl-repo-cloud-openclaw`,
  # `gpu-repo-local-ollama-openclaw`). The workflow previously pinned
  # `runs-on: ubuntu-latest` for every scenario, which caused non-Ubuntu
  # scenarios to fail on the wrong runner (CodeRabbit review item #1).
  resolve-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: |
          case "${SCENARIO}" in
            macos-*)  echo "runner=macos-26"      >> "$GITHUB_OUTPUT" ;;
            wsl-*)    echo "runner=windows-latest" >> "$GITHUB_OUTPUT" ;;
            gpu-*)    echo "runner=linux-amd64-gpu-rtxpro6000-latest-1" >> "$GITHUB_OUTPUT" ;;
            ubuntu-*|brev-*) echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::Unknown scenario prefix for runner selection: ${SCENARIO}" >&2
              exit 1
              ;;
          esac

  run-scenario:
    needs: resolve-runner
    runs-on: ${{ needs.resolve-runner.outputs.runner }}
    timeout-minutes: 90
    env:
      WSL_DISTRO: Ubuntu
      NEMOCLAW_RECREATE_SANDBOX: "1"
    steps:
      - name: Force LF line endings for WSL checkout
        if: startsWith(inputs.scenario, 'wsl-')
        shell: powershell
        run: git config --global core.autocrlf false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        if: ${{ !startsWith(inputs.scenario, 'wsl-') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Node on Windows host
        if: startsWith(inputs.scenario, 'wsl-')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install root dependencies
        if: ${{ !startsWith(inputs.scenario, 'wsl-') }}
        run: npm ci --ignore-scripts

      - name: Render coverage report
        if: ${{ !startsWith(inputs.scenario, 'wsl-') }}
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: |
          mkdir -p .e2e
          bash test/e2e/runtime/coverage-report.sh > .e2e/coverage.md
          {
            echo '# E2E Scenario Report'
            echo ''
            # Keep workflow_dispatch input in an env var so untrusted scenario text
            # is data, not YAML-interpolated shell source.
            printf '**Scenario:** `%s`\n' "$SCENARIO"
            echo ''
            cat .e2e/coverage.md
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Run scenario
        if: ${{ !startsWith(inputs.scenario, 'wsl-') }}
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          E2E_SUITE_FILTER: ${{ inputs.suite_filter }}
          SCENARIO: ${{ inputs.scenario }}
        run: |
          # Keep workflow inputs in env vars so untrusted scenario text
          # is data, not YAML-interpolated shell source.
          set +e
          bash test/e2e/runtime/run-scenario.sh "$SCENARIO"
          rc=$?
          set -e
          {
            echo ''
            echo '## Scenario execution result'
            echo ''
            if [ "$rc" -eq 0 ]; then
              printf -- '- Scenario `%s` completed successfully.\n' "$SCENARIO"
            else
              printf -- '- Scenario `%s` failed with exit code `%s`.\n' "$SCENARIO" "$rc"
            fi
            if grep -R '^SKIP:' .e2e test/e2e/logs >/tmp/e2e-skips.txt 2>/dev/null; then
              echo ''
              echo '### Runtime skips observed'
              echo ''
              sed 's/^/- `/' /tmp/e2e-skips.txt | sed 's/$/`/'
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
          exit "$rc"

      - name: Resolve workspace paths for WSL
        if: startsWith(inputs.scenario, 'wsl-')
        env:
          WSL_WORKDIR_PREFIX: /tmp/nemoclaw-scenario-wsl
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts resolve-paths

      - name: Ensure Ubuntu WSL exists
        if: startsWith(inputs.scenario, 'wsl-')
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts ensure-ubuntu

      - name: Install WSL dependencies
        if: startsWith(inputs.scenario, 'wsl-')
        env:
          WSL_INSTALL_DOCKER: "1"
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-ubuntu-deps

      - name: Install Node.js 22 in WSL
        if: startsWith(inputs.scenario, 'wsl-')
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-node

      - name: Copy checkout into WSL ext4 workspace
        if: startsWith(inputs.scenario, 'wsl-')
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts copy-checkout

      - name: Install root dependencies in WSL
        if: startsWith(inputs.scenario, 'wsl-')
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-root-and-render-coverage

      - name: Run scenario in WSL
        if: startsWith(inputs.scenario, 'wsl-')
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          E2E_SUITE_FILTER: ${{ inputs.suite_filter }}
          SCENARIO: ${{ inputs.scenario }}
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts run-scenario

      - name: Copy WSL artifacts back to checkout
        if: always() && startsWith(inputs.scenario, 'wsl-')
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts copy-artifacts-to-checkout

      - name: Upload scenario artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-scenario-${{ inputs.scenario }}
          path: |
            .e2e/
            test/e2e/logs/
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true
