name: E2E / WSL

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "bin/**"
      - "nemoclaw/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/wsl-e2e.yaml"
      - "package.json"
      - "vitest.config.ts"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: wsl-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wsl-e2e:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      WSL_DISTRO: Ubuntu
      NEMOCLAW_NON_INTERACTIVE: "1"
      NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
      NEMOCLAW_RECREATE_SANDBOX: "1"
      NEMOCLAW_SANDBOX_NAME: "e2e-wsl"
    steps:
      - name: Force LF line endings for checkout
        shell: powershell
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js on Windows host
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Resolve workspace paths for WSL
        env:
          WSL_WORKDIR_PREFIX: /tmp/nemoclaw-wsl-workdir
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts resolve-paths

      - name: Ensure Ubuntu WSL exists
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts ensure-ubuntu

      - name: Verify WSL
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts verify

      - name: Install Ubuntu dependencies
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-ubuntu-deps

      - name: Install Node.js 22 in WSL
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-node

      - name: Copy checkout into WSL ext4 workspace
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts copy-checkout

      - name: Install project dependencies and build plugin
        env:
          WSL_NPM_INSTALL_MODE: install
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-project

      - name: Detect Docker availability in WSL
        id: docker
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts docker-available

      - name: Run WSL full E2E
        if: steps.docker.outputs.docker_ok == 'true'
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts run-full-e2e

      - name: Explain skipped full E2E
        if: steps.docker.outputs.docker_ok != 'true'
        shell: powershell
        run: |
          Write-Host 'Skipping WSL full E2E because Docker is unavailable on this runner.'
          Write-Host 'The workflow still validated the NemoClaw build flow inside Ubuntu WSL.'

      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wsl-e2e-install-log
          path: |
            C:\Users\runneradmin\AppData\Local\Temp\nemoclaw-e2e-install.log
          if-no-files-found: ignore
