name: CI / Platform Vitest Main Watch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs-preview-*.yaml"
      - "ISSUE_TEMPLATE/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: platform-vitest-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-vitest:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Show environment
        run: |
          set -euo pipefail
          echo "Runner: $(uname -a)"
          echo "Arch:   $(uname -m)"
          sw_vers
          node --version
          npm --version

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          cd nemoclaw
          npm ci --ignore-scripts

      - name: Build CLI and plugin
        run: |
          npm run build:cli
          cd nemoclaw
          npm run build

      - name: Run full Vitest suite on macOS
        run: npx vitest run --testTimeout 60000

  wsl-vitest:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      WSL_DISTRO: Ubuntu
    steps:
      - name: Force LF line endings for checkout
        shell: powershell
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js on Windows host
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Resolve workspace paths for WSL
        env:
          WSL_WORKDIR_PREFIX: /tmp/nemoclaw-wsl-vitest
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts resolve-paths

      - name: Ensure Ubuntu WSL exists
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts ensure-ubuntu

      - name: Install Ubuntu dependencies
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-ubuntu-deps

      - name: Install Node.js 22 in WSL
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-node

      - name: Copy checkout into WSL ext4 workspace
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts copy-checkout

      - name: Install dependencies and build in WSL
        env:
          WSL_NPM_INSTALL_MODE: ci
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts install-project

      - name: Run full Vitest suite in WSL
        run: node --no-warnings --experimental-strip-types scripts/github/wsl.ts run-vitest
