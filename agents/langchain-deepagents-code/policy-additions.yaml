#
# Sandbox policy additions for LangChain Deep Agents Code. Principle: deny by
# default, allow the terminal harness, managed inference, and normal code-hosting
# and package endpoints. OpenShell sees dcode network calls as Python, so
# approved-host egress is intentionally process-wide for sandbox Python rather
# than a dcode-only boundary.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /sandbox/.deepagents
    - /tmp
    - /dev/null

landlock:
  # Deep Agents Code currently needs best-effort compatibility with the
  # OpenShell/FUSE sandbox filesystem. Tighten this to strict once OpenShell
  # exposes a non-FUSE workspace path that preserves the read-only /usr and /etc
  # policy proof for this terminal harness (tracked by #4861).
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  managed_inference:
    name: managed_inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
    binaries:
      - { path: /usr/local/bin/dcode }
      - { path: /usr/bin/python3* }
      - { path: /usr/local/lib/python3.13/** }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/dcode }
      - { path: /usr/bin/python3* }

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/pip3 }
      - { path: /usr/bin/python3* }
      - { path: /usr/local/bin/dcode }
