#
# Sandbox policy additions for LangChain Deep Agents Code.
# Principle: deny by default, allow only the terminal harness, managed
# inference route, normal code-hosting/package endpoints, and explicitly
# optional Tavily/LangSmith services.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /sandbox/.deepagents
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  managed_inference:
    name: managed_inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
    binaries:
      - { path: /usr/local/bin/dcode }
      - { path: /usr/local/bin/dcode.real }
      - { path: /usr/bin/python3* }
      - { path: /usr/local/lib/python3.13/** }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/dcode }
      - { path: /usr/local/bin/dcode.real }
      - { path: /usr/bin/python3* }

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/pip3 }
      - { path: /usr/bin/python3* }
      - { path: /usr/local/bin/dcode }
      - { path: /usr/local/bin/dcode.real }

  tavily:
    name: tavily
    endpoints:
      - host: api.tavily.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/dcode }
      - { path: /usr/local/bin/dcode.real }
      - { path: /usr/bin/python3* }

  langsmith:
    name: langsmith
    endpoints:
      - host: api.smith.langchain.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/dcode }
      - { path: /usr/local/bin/dcode.real }
      - { path: /usr/bin/python3* }
